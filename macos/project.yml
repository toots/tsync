name: tsync
options:
  bundleIdPrefix: com.toots
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    DEVELOPMENT_TEAM: PSE2VP6582
    CODE_SIGN_STYLE: Automatic

packages:
  soto:
    url: https://github.com/soto-project/soto
    from: "7.0.0"
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.3.0"

targets:
  TsyncApp:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Shared
      - path: TsyncApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toots.tsync
        CODE_SIGN_ENTITLEMENTS: TsyncApp/TsyncApp.entitlements
        INFOPLIST_FILE: TsyncApp/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../Frameworks"
    dependencies:
      - package: soto
        product: SotoS3
      - target: TsyncFileProvider
        embed: true

  TsyncFileProvider:
    type: app-extension
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Shared
      - path: TsyncFileProvider
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toots.tsync.fileprovider
        CODE_SIGN_ENTITLEMENTS: TsyncFileProvider/TsyncFileProvider.entitlements
        INFOPLIST_FILE: TsyncFileProvider/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_PREVIEWS: NO
    dependencies:
      - package: soto
        product: SotoS3

  tsync:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Shared
      - path: tsync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toots.tsync.cli
        CODE_SIGN_ENTITLEMENTS: tsync/tsync.entitlements
        INFOPLIST_FILE: tsync/Info.plist
    dependencies:
      - package: soto
        product: SotoS3
      - package: swift-argument-parser
        product: ArgumentParser

schemes:
  TsyncApp:
    build:
      targets:
        TsyncApp: all
    run:
      config: Debug
  tsync:
    build:
      targets:
        tsync: all
    run:
      config: Debug
