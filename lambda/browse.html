<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__OG_TITLE__</title>
    <meta name="description" content="__OG_DESC__" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="__OG_TITLE__" />
    <meta property="og:description" content="__OG_DESC__" />
    <meta name="twitter:card" content="summary" />
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font:
          15px/1.5 -apple-system,
          system-ui,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      header {
        padding: 16px 20px;
        border-bottom: 1px solid #8884;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      h1 {
        font-size: 18px;
        margin: 0;
        font-weight: 600;
      }
      .spacer {
        flex: 1;
      }
      a.btn,
      button.btn {
        font: inherit;
        padding: 7px 14px;
        border-radius: 8px;
        border: 1px solid #8886;
        background: #8881;
        color: inherit;
        cursor: pointer;
        text-decoration: none;
      }
      a.btn:hover,
      button.btn:hover {
        background: #8883;
      }
      main {
        flex: 1;
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
        padding: 12px 16px 48px;
      }
      .crumbs {
        padding: 10px 4px;
        color: #888;
      }
      .crumbs a {
        color: inherit;
        cursor: pointer;
        text-decoration: none;
      }
      .crumbs a:hover {
        text-decoration: underline;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      li {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 8px;
        border-bottom: 1px solid #8882;
      }
      li .ico {
        width: 1.4em;
        text-align: center;
      }
      li .name {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        cursor: pointer;
      }
      li .size {
        color: #888;
        font-variant-numeric: tabular-nums;
        font-size: 13px;
        white-space: nowrap;
      }
      li a.dl {
        color: #888;
        text-decoration: none;
        padding: 2px 6px;
        border-radius: 6px;
      }
      li a.dl:hover {
        background: #8883;
      }
      .empty {
        color: #888;
        padding: 24px 8px;
      }
      footer {
        padding: 16px 20px;
        border-top: 1px solid #8884;
        text-align: center;
        color: #888;
        font-size: 13px;
      }
      footer a {
        color: inherit;
      }
      dialog {
        border: none;
        border-radius: 12px;
        padding: 0;
        max-width: 92vw;
        max-height: 92vh;
        background: #222;
        color: #eee;
      }
      dialog::backdrop {
        background: #000a;
      }
      .pv-head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
      }
      .pv-head .t {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pv-body {
        padding: 0 14px 14px;
        text-align: center;
      }
      .pv-body img,
      .pv-body video {
        max-width: 86vw;
        max-height: 74vh;
      }
      .pv-body iframe {
        width: 86vw;
        height: 80vh;
        border: 0;
        background: #fff;
      }
      .pv-body audio {
        width: min(70vw, 480px);
      }
      .x {
        cursor: pointer;
        border: none;
        background: none;
        color: inherit;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="title">share</h1>
      <span class="spacer"></span>
      <a class="btn" id="dlall">Download all (zip)</a>
    </header>
    <main>
      <div class="crumbs" id="crumbs"></div>
      <ul id="list"></ul>
    </main>
    <footer>
      Shared with
      <a href="https://github.com/toots/tsync" target="_blank" rel="noopener"
        >tsync</a
      >
    </footer>

    <dialog id="pv">
      <div class="pv-head">
        <span class="t" id="pvt"></span>
        <a class="btn" id="pvdl">Download</a>
        <button class="x" id="pvx" aria-label="Close">&times;</button>
      </div>
      <div class="pv-body" id="pvb"></div>
    </dialog>

    <script>
      const DATA = __SHARE_DATA__;
      const B = DATA.base;
      document.getElementById("dlall").href = B + "/download";
      document.getElementById("title").textContent = DATA.title;
      document.title = DATA.title + " — tsync share";

      // ext -> preview kind, generated from MIME in handler.py.
      const PREVIEW_KINDS = __PREVIEW_KINDS__;
      function kind(name) {
        const e = name.includes(".") ? name.split(".").pop().toLowerCase() : "";
        return PREVIEW_KINDS[e] || null;
      }
      const ICON = {
        image: "🖼",
        audio: "🎵",
        video: "🎬",
        pdf: "📕",
        html: "🌐",
        text: "📄",
      };

      function humanSize(n) {
        if (n == null) return "";
        const u = ["B", "KB", "MB", "GB", "TB", "PB"];
        let i = 0;
        while (n >= 1024 && i < u.length - 1) {
          n /= 1024;
          i++;
        }
        return (i === 0 ? n : n.toFixed(1)) + " " + u[i];
      }

      // path = decoded folder segments from the share root. The file listing for
      // the current folder is fetched lazily from the Lambda, so nothing about
      // the directory is loaded until it is actually opened. The path lives in
      // the URL hash so Back/Forward walk the folder history and deep links are
      // bookmarkable.
      let path = [];
      const fileUrl = (name, q) =>
        B + "/f?path=" + encodeURIComponent([...path, name].join("/")) + q;

      const pathToHash = (p) => "#/" + p.map(encodeURIComponent).join("/");
      const pathFromHash = () => {
        const h = location.hash.replace(/^#\/?/, "");
        return h ? h.split("/").map(decodeURIComponent) : [];
      };
      function navigate(p) {
        const target = pathToHash(p);
        if (location.hash === target) render();
        else location.hash = target; // triggers hashchange -> sync()
      }

      function renderCrumbs() {
        const cr = document.getElementById("crumbs");
        cr.innerHTML = "";
        const mk = (label, idx) => {
          const a = document.createElement("a");
          a.textContent = label;
          a.onclick = () => navigate(path.slice(0, idx));
          return a;
        };
        cr.appendChild(mk(DATA.title || "root", 0));
        path.forEach((seg, k) => {
          cr.append(" / ");
          cr.appendChild(mk(seg, k + 1));
        });
      }

      async function render() {
        renderCrumbs();
        const ul = document.getElementById("list");
        ul.innerHTML = '<div class="empty">Loading…</div>';
        let data;
        try {
          const r = await fetch(
            B + "/list?path=" + encodeURIComponent(path.join("/")),
          );
          if (!r.ok) throw new Error(r.status);
          data = await r.json();
        } catch (e) {
          ul.innerHTML = '<div class="empty">Failed to load (' + e.message + ")</div>";
          return;
        }
        ul.innerHTML = "";
        if (!data.dirs.length && !data.files.length) {
          ul.innerHTML = '<div class="empty">Empty folder</div>';
          return;
        }

        for (const d of data.dirs) {
          const li = document.createElement("li");
          li.innerHTML = '<span class="ico">📁</span>';
          const n = document.createElement("span");
          n.className = "name";
          n.textContent = d;
          n.onclick = () => navigate([...path, d]);
          li.appendChild(n);
          ul.appendChild(li);
        }
        for (const f of data.files) {
          const k = kind(f.name);
          const li = document.createElement("li");
          const ic = document.createElement("span");
          ic.className = "ico";
          ic.textContent = ICON[k] || "📄";
          const n = document.createElement("span");
          n.className = "name";
          n.textContent = f.name;
          n.onclick = k
            ? () => preview(f, k)
            : () => {
                location.href = fileUrl(f.name, "&dl=1");
              };
          const sz = document.createElement("span");
          sz.className = "size";
          sz.textContent = humanSize(f.size);
          const dl = document.createElement("a");
          dl.className = "dl";
          dl.textContent = "⬇";
          dl.title = "Download";
          dl.href = fileUrl(f.name, "&dl=1");
          li.append(ic, n, sz, dl);
          ul.appendChild(li);
        }
      }

      const pv = document.getElementById("pv");
      async function preview(f, k) {
        document.getElementById("pvt").textContent = f.name;
        document.getElementById("pvdl").href = fileUrl(f.name, "&dl=1");
        const body = document.getElementById("pvb");
        body.innerHTML = "Loading…";
        if (!pv.open) pv.showModal();
        const r = await fetch(fileUrl(f.name, "&json=1"));
        if (!r.ok) {
          body.textContent = "Preview failed (" + r.status + ")";
          return;
        }
        const { url } = await r.json();
        let el;
        if (k === "image") el = new Image();
        else if (k === "pdf") el = document.createElement("iframe");
        else if (k === "html" || k === "text") {
          el = document.createElement("iframe");
          el.setAttribute("sandbox", ""); // render markup, block scripts/forms
        } else
          el = Object.assign(document.createElement(k), {
            controls: true,
            autoplay: true,
          });
        el.src = url;
        body.innerHTML = "";
        body.appendChild(el);
      }
      document.getElementById("pvx").onclick = () => pv.close();
      pv.addEventListener("close", () => {
        document.getElementById("pvb").innerHTML = "";
      });

      // Drive the current folder from the URL hash: Back/Forward and deep links
      // just change the hash, which re-renders.
      function sync() {
        path = pathFromHash();
        render();
      }
      window.addEventListener("hashchange", sync);
      sync();
    </script>
  </body>
</html>
