name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd linux/docker && docker compose build

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.5"
      - name: Pin packages
        run: |
          opam pin add -ny fuse3 git+https://github.com/toots/ocamlfuse.git
          opam pin add -ny aws-s3-lwt git+https://github.com/toots/aws-s3.git
          opam pin -ny .
      - name: Install OCaml dependencies
        run: opam install --deps-only -y tsync tsync-s3
      - name: Build OCaml daemon
        run: opam exec -- dune build
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Build macOS app
        run: make generate && xcodebuild -project tsync.xcodeproj -scheme TsyncApp -configuration Debug CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
        working-directory: macos
