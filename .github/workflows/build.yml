name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev fuse pkg-config libxxhash-dev
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.5"
      - name: Pin packages
        run: |
          opam pin -ny .
          opam pin add -ny fuse3 git+https://github.com/toots/ocamlfuse.git
      - name: Install OCaml dependencies
        run: opam install --deps-only -y tsync tsync-s3 tsync-fuse
      - name: Build OCaml daemon
        run: opam exec -- dune build
      - name: Run tests
        run: opam exec -- dune test

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.5"
      - name: Pin packages
        run: opam pin -ny .
      - name: Install dependencies
        run: |
          brew install xcodegen xxhash
          echo "CPATH=$(brew --prefix xxhash)/include:$CPATH" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$(brew --prefix xxhash)/lib:$LIBRARY_PATH" >> $GITHUB_ENV
      - name: Install OCaml dependencies
        run: opam install --deps-only -y tsync tsync-s3
      - name: Build OCaml daemon
        run: opam exec -- dune build
      - name: Run tests
        run: opam exec -- dune test
      - name: Build macOS app
        run: make generate && xcodebuild -project tsync.xcodeproj -scheme TsyncApp -configuration Debug CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
        working-directory: macos
